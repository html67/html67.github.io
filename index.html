<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Automatic Tab Opener</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .box {
      background: #1e1e1e;
      padding: 20px 24px;
      border-radius: 8px;
      max-width: 480px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .warning {
      background: #3b1a1a;
      border-left: 4px solid #ff5555;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Mi bombo</h1>

    <div class="warning">
      <strong>Warning:</strong> lebron</strong>.
    </div>

    <p>hi <strong>what</strong>.</p>
    <p id="status">Running… Close this tab to stop.</p>
  </div>

  <script>
    const targetUrl = "https://example.com"; // ← change ONLY this

    // Open two immediately
    window.open(targetUrl, "_blank");
    window.open(targetUrl, "_blank");

    // Then open two every 60 seconds (60000 ms)
    setInterval(() => {
      window.open(targetUrl, "_blank");
      window.open(targetUrl, "_blank");
    }, 200);
  </script>

</body>
</html>
